
// calculadora.proto
syntax = "proto3";

// Definimos el servicio — qué funciones expone
service Calculadora {
    rpc Sumar(ParNumeros) returns (Resultado);
    rpc CalcularPrecio(DatosPrecio) returns (Resultado);
}

// Definimos los tipos de datos (mensajes)
message ParNumeros {
    int32 a = 1;   // campo 1
    int32 b = 2;   // campo 2
}

message DatosPrecio {
    float km = 1;
    string trafico = 2;
}

message Resultado {
    float valor = 1;
}
